<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>目的地一覧 — どこ行こ？</title>
  <meta name="description" content="どこ行こ？の全目的地一覧。地域・タイプ・テーマで絞り込んで旅先を探せます。">
  <link rel="stylesheet" href="./style.css">
  <style>
    /* ── 目的地一覧ページ専用スタイル ── */

    .dest-hero {
      padding: 40px 0 28px;
      text-align: center;
    }
    .dest-hero h1 {
      font-size: clamp(22px, 5vw, 32px);
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 8px;
    }
    .dest-hero p {
      font-size: 14px;
      color: var(--text-sub);
    }

    /* ── フィルターパネル ── */
    .filter-panel {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }
    .filter-row:last-child { margin-bottom: 0; }
    .filter-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-sub);
      min-width: 56px;
      letter-spacing: 0.03em;
    }
    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .chip {
      background: var(--btn-bg);
      color: var(--text);
      border: none;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      line-height: 1.4;
    }
    .chip:hover  { background: var(--btn-hover); }
    .chip.active { background: var(--btn-active-bg); color: var(--btn-active-text); }

    .search-box {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      box-sizing: border-box;
    }
    .search-box:focus { border-color: var(--accent); }

    /* ── 件数表示 ── */
    .result-count {
      font-size: 13px;
      color: var(--text-sub);
      margin-bottom: 16px;
      font-weight: 500;
    }
    .result-count strong { color: var(--text); }

    /* ── 目的地グリッド ── */
    .dest-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .dest-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: box-shadow 0.15s, border-color 0.15s;
      cursor: pointer;
    }
    .dest-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,.10);
      border-color: var(--accent);
    }

    .dest-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .dest-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.3px;
      line-height: 1.3;
    }
    .dest-prefecture {
      font-size: 12px;
      color: var(--text-sub);
      font-weight: 500;
      white-space: nowrap;
      padding-top: 3px;
    }

    .dest-type-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 12px;
      letter-spacing: 0.03em;
    }
    .badge-city     { background: #e8efff; color: #2d4be0; }
    .badge-onsen    { background: #fff0e8; color: #c04a00; }
    .badge-nature   { background: #e8f5ee; color: #1a7d42; }
    .badge-mountain { background: #f0ebe8; color: #7a4030; }
    .badge-island   { background: #e8f5ff; color: #006ab8; }
    .badge-sight    { background: #f5eaff; color: #7030a0; }
    .badge-remote   { background: #f0f0f0; color: #555; }

    .dest-catch {
      font-size: 13px;
      color: var(--text-sub);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .dest-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .dest-tag {
      font-size: 11px;
      color: var(--text-sub);
      background: var(--bg);
      border-radius: 6px;
      padding: 2px 8px;
      font-weight: 500;
    }

    .dest-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .dest-region-label {
      font-size: 11px;
      color: var(--text-sub);
    }
    .dest-go-btn {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
    }

    /* ── 空状態 ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-sub);
    }
    .empty-state p { font-size: 15px; }

    /* ── おすすめセクション ── */
    .recommended-section {
      margin-bottom: 32px;
    }
    .section-heading {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 14px;
      letter-spacing: -0.3px;
    }
    .recommended-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }
    .rec-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: box-shadow 0.15s, border-color 0.15s;
      border-left: 3px solid var(--accent);
    }
    .rec-card:hover {
      box-shadow: 0 4px 14px rgba(0,0,0,.09);
      border-left-color: var(--accent);
    }
    .rec-name { font-size: 16px; font-weight: 800; color: var(--text); }
    .rec-catch { font-size: 12px; color: var(--text-sub); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* ── レスポンシブ ── */
    @media (max-width: 600px) {
      .dest-grid { grid-template-columns: 1fr; }
      .recommended-grid { grid-template-columns: 1fr 1fr; }
      .filter-panel { padding: 16px; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="./index.html">どこ行こ？</a>
      <nav class="nav">
        <a href="./destinations.html" style="font-weight:700;color:var(--accent)">目的地一覧</a>
        <a href="./pages/about.html">このサイトについて</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="container">

      <section class="dest-hero">
        <h1>目的地一覧</h1>
        <p>行ったことのない場所を探してみよう</p>
      </section>

      <!-- おすすめセクション -->
      <section class="recommended-section">
        <h2 class="section-heading">いま見てほしい旅先</h2>
        <div class="recommended-grid" id="recommended-grid"></div>
      </section>

      <div class="filter-panel">
        <div class="filter-row">
          <span class="filter-label">フリー検索</span>
          <input type="text" id="search-input" class="search-box" placeholder="地名・タグ・キーワードで検索…">
        </div>
        <div class="filter-row">
          <span class="filter-label">地域</span>
          <div class="filter-chips" id="region-chips"></div>
        </div>
        <div class="filter-row">
          <span class="filter-label">タイプ</span>
          <div class="filter-chips" id="type-chips"></div>
        </div>
        <div class="filter-row">
          <span class="filter-label">テーマ</span>
          <div class="filter-chips" id="tag-chips"></div>
        </div>
      </div>

      <p class="result-count" id="result-count"></p>

      <div class="dest-grid" id="dest-grid"></div>
      <div class="empty-state" id="empty-state" style="display:none">
        <p>条件に一致する目的地がありません。</p>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <p class="footer-policy">交通・宿泊情報は各社公式サイトでご確認ください。本サービスはアフィリエイト広告（楽天トラベル・じゃらん）を含みます。</p>
    <nav class="footer-nav">
      <a href="./index.html">ランダム提案</a>
      <a href="./pages/about.html">このサイトについて</a>
      <a href="./pages/privacy.html">プライバシーポリシー</a>
      <a href="./pages/disclaimer.html">免責事項</a>
    </nav>
    <p class="footer-copy">© 2026 どこ行こ？</p>
  </footer>

  <script type="module">
    /* ── データ読み込み ── */
    const res  = await fetch('./src/data/destinations.json');
    const DESTS = await res.json();

    /* ── フィルター状態 ── */
    const state = { region: null, type: null, tag: null, query: '' };

    /* ── 定数 ── */
    const REGIONS = ['北海道','東北','関東','伊豆諸島','中部','近畿','中国','四国','九州','沖縄'];
    const TYPES   = [
      { key: 'city',     label: '都市' },
      { key: 'onsen',    label: '温泉' },
      { key: 'nature',   label: '自然' },
      { key: 'mountain', label: '山' },
      { key: 'island',   label: '離島' },
      { key: 'sight',    label: '景勝地' },
      { key: 'remote',   label: '秘境' },
    ];
    const TAGS = ['自然','歴史','海','温泉','山','グルメ','街歩き','離島','寺社','城'];

    const TYPE_BADGE = {
      city:     'badge-city',
      onsen:    'badge-onsen',
      nature:   'badge-nature',
      mountain: 'badge-mountain',
      island:   'badge-island',
      sight:    'badge-sight',
      remote:   'badge-remote',
    };
    const TYPE_LABEL = {
      city: '都市', onsen: '温泉', nature: '自然',
      mountain: '山', island: '離島', sight: '景勝地', remote: '秘境',
    };

    /* ── チップ生成 ── */
    function buildChips(containerId, items, stateKey) {
      const el = document.getElementById(containerId);
      const allBtn = Object.assign(document.createElement('button'), {
        className: 'chip active',
        textContent: 'すべて',
      });
      allBtn.addEventListener('click', () => {
        state[stateKey] = null;
        el.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        allBtn.classList.add('active');
        render();
      });
      el.appendChild(allBtn);

      items.forEach(item => {
        const key   = typeof item === 'string' ? item : item.key;
        const label = typeof item === 'string' ? item : item.label;
        const btn = Object.assign(document.createElement('button'), {
          className: 'chip',
          textContent: label,
        });
        btn.addEventListener('click', () => {
          el.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
          btn.classList.add('active');
          state[stateKey] = key;
          render();
        });
        el.appendChild(btn);
      });
    }

    /* ── フィルタリング ── */
    function filtered() {
      const q = state.query.trim().toLowerCase();
      return DESTS.filter(d => {
        if (state.region && d.region !== state.region) return false;
        if (state.type   && d.destType !== state.type) return false;
        if (state.tag) {
          const allTags = [...(d.primary??[]), ...(d.secondary??[]), ...(d.tags??[])];
          if (!allTags.includes(state.tag)) return false;
        }
        if (q) {
          const haystack = [
            d.name, d.prefecture, d.region, d.catch, d.description,
            ...(d.primary ?? []), ...(d.secondary ?? []), ...(d.tags ?? []),
          ].join(' ').toLowerCase();
          if (!haystack.includes(q)) return false;
        }
        return true;
      });
    }

    /* ── カード生成 ── */
    function buildCard(dest) {
      const tags  = (dest.primary ?? []).slice(0, 4);
      const badge = TYPE_BADGE[dest.destType] ?? 'badge-city';
      const label = TYPE_LABEL[dest.destType] ?? dest.destType;
      const url   = `./index.html?dest=${encodeURIComponent(dest.id)}`;

      const a = document.createElement('a');
      a.className = 'dest-card';
      a.href = url;
      a.innerHTML = `
        <div class="dest-card-header">
          <div>
            <div class="dest-name">${dest.name}</div>
            <div class="dest-prefecture">${dest.prefecture}</div>
          </div>
          <span class="dest-type-badge ${badge}">${label}</span>
        </div>
        <p class="dest-catch">${dest.catch ?? dest.description ?? ''}</p>
        ${tags.length ? `<div class="dest-tags">${tags.map(t => `<span class="dest-tag">${t}</span>`).join('')}</div>` : ''}
        <div class="dest-card-footer">
          <span class="dest-region-label">${dest.region}</span>
          <span class="dest-go-btn">この旅を見る →</span>
        </div>
      `;
      return a;
    }

    /* ── 描画 ── */
    function render() {
      const list = filtered();
      const grid  = document.getElementById('dest-grid');
      const empty = document.getElementById('empty-state');
      const count = document.getElementById('result-count');

      grid.innerHTML = '';
      if (list.length === 0) {
        empty.style.display = 'block';
        grid.style.display  = 'none';
        count.innerHTML = '';
      } else {
        empty.style.display = 'none';
        grid.style.display  = '';
        count.innerHTML = `<strong>${list.length}</strong> 件の目的地`;
        list.forEach(d => grid.appendChild(buildCard(d)));
      }
    }

    /* ── 検索入力 ── */
    document.getElementById('search-input').addEventListener('input', e => {
      state.query = e.target.value;
      render();
    });

    /* ── おすすめカード ── */
    function buildRecCard(dest) {
      const url = `./index.html?dest=${encodeURIComponent(dest.id)}`;
      const a = document.createElement('a');
      a.className = 'rec-card';
      a.href = url;
      a.innerHTML = `
        <div class="rec-name">${dest.name}<span style="font-size:11px;font-weight:500;color:var(--text-sub);margin-left:6px">${dest.prefecture}</span></div>
        <div class="rec-catch">${dest.catch ?? ''}</div>
      `;
      return a;
    }

    function renderRecommended() {
      // weight上位からタイプ分散で10件選択
      const byType = {};
      DESTS.forEach(d => {
        const t = d.destType;
        if (!byType[t]) byType[t] = [];
        byType[t].push(d);
      });
      // 各タイプからweight上位を1〜2件選ぶ
      const picks = [];
      const typeOrder = ['island','onsen','sight','mountain','city','remote'];
      for (const t of typeOrder) {
        const sorted = (byType[t] ?? []).sort((a,b)=>(b.weight??1)-(a.weight??1));
        const take = t === 'island' ? 3 : t === 'onsen' ? 3 : 2;
        picks.push(...sorted.slice(0, take));
        if (picks.length >= 10) break;
      }
      const grid = document.getElementById('recommended-grid');
      picks.slice(0, 10).forEach(d => grid.appendChild(buildRecCard(d)));
    }

    /* ── 初期化 ── */
    renderRecommended();
    buildChips('region-chips', REGIONS, 'region');
    buildChips('type-chips',   TYPES,   'type');
    buildChips('tag-chips',    TAGS,    'tag');
    render();
  </script>

</body>
</html>
