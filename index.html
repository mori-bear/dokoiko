<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>どこ行こ？ — 知らない街に出会う旅のきっかけ</title>
  <meta name="description" content="旅先を決めかねているあなたへ。出発地と日程を選ぶだけで、まだ行ったことのない日本の街と出会えます。">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- イントロ演出（毎回表示） -->
  <div id="intro-overlay" class="intro-overlay" aria-hidden="true">
    <p class="intro-text">知らない街に、出会おう。</p>
  </div>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="./index.html">どこ行こ？</a>
      <nav class="nav">
        <a href="./pages/about.html">このサイトについて</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="container">

      <section class="hero">
        <h1 class="hero-heading">知らない街に、出会おう。</h1>
        <p class="hero-sub">旅先を選ぶのではなく、旅先に出会う。<br>出発地と日程を選ぶだけ。</p>
      </section>

      <section class="controls">

        <!-- 出発地 -->
        <div class="control-group">
          <label class="control-label" for="departure-select">出発地</label>
          <select id="departure-select" class="departure-select">
            <optgroup label="北海道・東北">
              <option value="札幌">札幌</option>
              <option value="函館">函館</option>
              <option value="旭川">旭川</option>
              <option value="仙台">仙台</option>
              <option value="盛岡">盛岡</option>
            </optgroup>
            <optgroup label="関東">
              <option value="東京" selected>東京</option>
              <option value="横浜">横浜</option>
              <option value="千葉">千葉</option>
              <option value="大宮">大宮</option>
              <option value="宇都宮">宇都宮</option>
            </optgroup>
            <optgroup label="中部">
              <option value="長野">長野</option>
              <option value="静岡">静岡</option>
              <option value="名古屋">名古屋</option>
              <option value="金沢">金沢</option>
              <option value="富山">富山</option>
            </optgroup>
            <optgroup label="近畿">
              <option value="大阪">大阪</option>
              <option value="京都">京都</option>
              <option value="神戸">神戸</option>
              <option value="奈良">奈良</option>
            </optgroup>
            <optgroup label="中国・四国">
              <option value="広島">広島</option>
              <option value="岡山">岡山</option>
              <option value="松江">松江</option>
              <option value="高松">高松</option>
              <option value="松山">松山</option>
              <option value="高知">高知</option>
              <option value="徳島">徳島</option>
            </optgroup>
            <optgroup label="九州">
              <option value="福岡">福岡</option>
              <option value="熊本">熊本</option>
              <option value="鹿児島">鹿児島</option>
              <option value="長崎">長崎</option>
              <option value="宮崎">宮崎</option>
            </optgroup>
          </select>
        </div>

        <!-- 旅の長さ -->
        <div class="control-group">
          <label class="control-label">旅の長さ</label>
          <div class="btn-group">
            <button class="sel-btn" data-stay="daytrip">日帰り</button>
            <button class="sel-btn active" data-stay="1night">1泊</button>
            <button class="sel-btn" data-stay="2night">2泊</button>
            <button class="sel-btn" data-stay="3night+">3泊以上</button>
          </div>
        </div>

        <!-- テーマ -->
        <div class="control-group">
          <label class="control-label">テーマ</label>
          <div class="btn-group">
            <button class="sel-btn active" data-theme="">こだわらない</button>
            <button class="sel-btn" data-theme="温泉">温泉</button>
            <button class="sel-btn" data-theme="絶景">絶景</button>
            <button class="sel-btn" data-theme="海">海</button>
            <button class="sel-btn" data-theme="街歩き">街歩き</button>
            <button class="sel-btn" data-theme="グルメ">グルメ</button>
          </div>
        </div>

        <!-- エラー -->
        <p id="form-error" class="form-error" hidden></p>

        <!-- GOボタン -->
        <button id="go-btn" class="go-btn">どこ行こ？</button>

      </section>

      <!-- 結果 -->
      <section id="result" class="result" hidden>
        <div id="result-inner"></div>
        <div class="retry-area">
          <button id="retry-btn" class="retry-btn">引き直す</button>
        </div>
      </section>

    </div>
  </main>

  <footer class="site-footer">
    <p class="footer-policy">交通・宿泊情報は各社公式サイトでご確認ください。本サービスはアフィリエイト広告（楽天トラベル・じゃらん）を含みます。</p>
    <nav class="footer-nav">
      <a href="./pages/about.html">このサイトについて</a>
      <a href="./pages/privacy.html">プライバシーポリシー</a>
      <a href="./pages/disclaimer.html">免責事項</a>
    </nav>
    <p class="footer-copy">© 2026 どこ行こ？</p>
  </footer>

  <script type="module" src="./app.js"></script>
</body>
</html>
