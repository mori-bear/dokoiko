  <meta name="twitter:card"       content="summary">

  <link rel="stylesheet" href="./style.css">
  <!-- JSクラッシュ可視化 + フォールバックタイマー（モジュールより前に同期実行） -->
  <script>
    // エラーをページ上に赤字で表示（JSクラッシュ原因が一目でわかる）
    function showError(label, msg) {
      var el = document.getElementById('intro-overlay');
      if (el) { el.style.cssText += ';opacity:0;visibility:hidden'; }
      var pre = document.createElement('pre');
      pre.id = 'js-error-banner';
      pre.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#fff0f0;color:#c00;padding:16px;font-size:12px;z-index:99999;white-space:pre-wrap;border-bottom:3px solid #c00;max-height:50vh;overflow:auto;';
      pre.textContent = '[' + label + ']\n' + msg;
      document.body ? document.body.prepend(pre) : document.addEventListener('DOMContentLoaded', function(){ document.body.prepend(pre); });
    }
    window.onerror = function(msg, src, line, col, err) {
      showError('JS ERROR', msg + '\n' + (src ? src + ':' + line + ':' + col : '') + '\n' + (err && err.stack ? err.stack : ''));
    };
    window.addEventListener('unhandledrejection', function(e) {
      showError('Promise Rejection', e.reason?.stack ?? String(e.reason ?? e));
    });
    // フォールバック: 8s後にオーバーレイを強制削除（JSON読み込み遅延に対応）
    setTimeout(function() {
      var el = document.getElementById('intro-overlay');
      if (el) { el.style.cssText += ';opacity:0;visibility:hidden'; setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 600); }
    }, 8000);
    // 20s後にJSモジュールが起動したか診断（大容量JSON読み込みに余裕を持たせる）
    // __appInitStarted は import完了直後（init()の外）に設定されるため、
    // 20s超でも未設定 = 本物のモジュール読み込み失敗
    setTimeout(function() {
      if (!window.__appInitStarted) {
        showError('MODULE LOAD FAILURE',
          'app.js が20秒経っても起動していません。\n\n' +
          '【確認手順】\n' +
          '1. F12 → Console タブを開く\n' +
          '2. 赤字のエラーを探す（"SyntaxError" "Failed to fetch" "404" など）\n' +
          '3. Network タブ → JS/Fetch で失敗しているファイルを確認\n\n' +
          '【よくある原因】\n' +
          '・file:// で直接開いている → "npx serve ." で起動\n' +
          '・GitHub Pagesでキャッシュが古い → Ctrl+Shift+R で強制リロード\n' +
          '・ネットワークエラー → オフラインかVPNを確認'
        );
      }
    }, 20000);
  </script>
</head>
<body>

  <main class="main">

              <option value="仙台">仙台</option>
              <option value="盛岡">盛岡</option>
            </optgroup>
            <optgroup label="関東">
              <option value="東京" selected>東京</option>
              <option value="横浜">横浜</option>
              <option value="千葉">千葉</option>

              <option value="宇都宮">宇都宮</option>
            </optgroup>
            <optgroup label="中部">
              <option value="長野">長野</option>
              <option value="静岡">静岡</option>
              <option value="名古屋">名古屋</option>
              <option value="金沢">金沢</option>
              <option value="富山">富山</option>
            </optgroup>
            <optgroup label="近畿">
              <option value="大阪">大阪</option>
              <option value="京都">京都</option>
              <option value="神戸">神戸</option>
              <option value="奈良">奈良</option>
            </optgroup>
            <optgroup label="中国・四国">
              <option value="広島">広島</option>
              <option value="岡山">岡山</option>
              <option value="松江">松江</option>
              <option value="高松">高松</option>
              <option value="松山">松山</option>
              <option value="高知">高知</option>
              <option value="徳島">徳島</option>
            </optgroup>
            <optgroup label="九州">
              <option value="福岡">福岡</option>
              <option value="熊本">熊本</option>
              <option value="鹿児島">鹿児島</option>
              <option value="長崎">長崎</option>
              <option value="宮崎">宮崎</option>
            </optgroup>

        </div>

        <!-- 旅の長さ -->
        <div class="control-group">
          <label class="control-label">旅の長さ</label>
          <div class="btn-group">

            <button class="sel-btn active" data-stay="1night">1泊</button>
            <button class="sel-btn" data-stay="2night">2泊</button>
            <button class="sel-btn" data-stay="3night+">3泊以上</button>
          </div>
        </div>

        <!-- テーマ -->

          <label class="control-label">テーマ</label>

            <button class="sel-btn" data-theme="温泉">温泉</button>

            <button class="sel-btn" data-theme="グルメ">グルメ</button>
          </div>
        </div>

        <!-- オプション -->
        <div class="control-group">
          <label class="control-label">オプション</label>
          <div class="btn-group">
            <button class="sel-btn" data-exclude-car>🚗 レンタカー不要のみ</button>
          </div>
        </div>

        <!-- エラー -->
        <p id="form-error" class="form-error" hidden></p>

        <!-- GOボタン -->
        <!-- onclick属性はモジュール失敗時のフォールバック診断用 -->
        <button id="go-btn" class="go-btn"
          onclick="console.log('[go-btn onclick] appInit=' + !!window.__appInitStarted + ' destinations=' + (window.__appState && window.__appState.destinations && window.__appState.destinations.length))">
          どこ行こ？
        </button>

      </section>

      <!-- 結果 -->
      <section id="result" class="result" hidden>
        <div id="result-inner"></div>
        <div class="retry-area">
          <button id="retry-btn" class="retry-btn">別の旅先を見る</button>
        </div>
      </section>

    </div>

  <script type="module" src="./app.js?v=20260405" onerror="
    var msg = 'app.js モジュールの読み込みに失敗しました。\n\n' +
      'ブラウザの Console → Network タブで\n' +
      '404や ERR_FAILED になっているファイルを確認してください。';
    if(window.showError) window.showError('SCRIPT LOAD ERROR', msg);
    else console.error('[SCRIPT LOAD ERROR]', msg);
